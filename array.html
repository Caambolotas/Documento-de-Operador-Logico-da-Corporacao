<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array de Carros do Sargento Hamster Spike</title>
</head>
<body>
    <script>
        //declaração dos carros
        const Carros = ["Jetta", "Civic", "Byd"];

        //loop dos carros
        for(let car in Carros) {
            //mostra no documento
            document.write("<br>Carro: " + car);
        }
    </script>
</body>
</html>
